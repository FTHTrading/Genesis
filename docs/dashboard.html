<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesix — Living Organism</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',-apple-system,sans-serif;color:#c8d6e5}
canvas{display:block}

/* HUD overlay */
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10}
#hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 28px}
#hud-title{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:rgba(200,214,229,.5)}
#hud-title strong{color:#22d3ee;font-weight:600;font-size:15px;letter-spacing:.04em}
#hud-epoch{font-size:11px;color:rgba(200,214,229,.35);font-variant-numeric:tabular-nums;text-align:right}
#hud-epoch .big{font-size:32px;font-weight:200;color:rgba(34,211,238,.7);display:block;line-height:1}

/* Vital signs — bottom left */
#vitals{position:fixed;bottom:20px;left:28px;z-index:10;pointer-events:none}
.vital{margin-bottom:10px}
.vital-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:rgba(200,214,229,.3);margin-bottom:2px}
.vital-value{font-size:16px;font-weight:300;font-variant-numeric:tabular-nums;color:rgba(200,214,229,.7)}
.vital-value.warn{color:rgba(251,191,36,.8)}
.vital-value.danger{color:rgba(248,113,113,.8)}
.vital-value.good{color:rgba(52,211,153,.7)}

/* Agent tooltip */
#tooltip{position:fixed;pointer-events:none;z-index:20;background:rgba(15,23,42,.92);border:1px solid rgba(34,211,238,.2);border-radius:6px;padding:12px 16px;font-size:12px;line-height:1.6;display:none;backdrop-filter:blur(8px);max-width:240px}
#tooltip .tt-role{font-size:14px;font-weight:600;margin-bottom:4px}
#tooltip .tt-row{display:flex;justify-content:space-between;gap:16px}
#tooltip .tt-dim{color:rgba(200,214,229,.4)}
#tooltip .tt-val{font-weight:500;font-variant-numeric:tabular-nums}

/* Treasury well indicator */
#treasury-indicator{position:fixed;bottom:20px;right:28px;z-index:10;pointer-events:none;text-align:right}
#treasury-indicator .ti-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:rgba(251,191,36,.3);margin-bottom:2px}
#treasury-indicator .ti-value{font-size:22px;font-weight:200;color:rgba(251,191,36,.5)}
#treasury-indicator .ti-status{font-size:10px;color:rgba(248,113,113,.5);margin-top:4px}

/* Legend */
#legend{position:fixed;top:50%;right:28px;transform:translateY(-50%);z-index:10;pointer-events:none}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:10px;color:rgba(200,214,229,.3)}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* Loading */
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:100;font-size:13px;color:rgba(200,214,229,.3)}
</style>
</head>
<body>

<div id="loading">initializing organism...</div>

<div id="hud">
  <div id="hud-top">
    <div id="hud-title"><strong>GENESIX</strong><br>Genesis Protocol</div>
    <div id="hud-epoch">EPOCH<span class="big" id="epoch-num">—</span></div>
  </div>
</div>

<div id="vitals">
  <div class="vital"><div class="vital-label">Population</div><div class="vital-value" id="v-pop">—</div></div>
  <div class="vital"><div class="vital-label">Mean Fitness</div><div class="vital-value" id="v-fit">—</div></div>
  <div class="vital"><div class="vital-label">ATP Supply</div><div class="vital-value" id="v-atp">—</div></div>
  <div class="vital"><div class="vital-label">Births / Deaths</div><div class="vital-value" id="v-bd">—</div></div>
  <div class="vital"><div class="vital-label">Birth:Death</div><div class="vital-value" id="v-ratio">—</div></div>
</div>

<div id="treasury-indicator">
  <div class="ti-label">Treasury Gravity Well</div>
  <div class="ti-value" id="ti-val">—</div>
  <div class="ti-status" id="ti-status"></div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>Optimizer</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Strategist</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Communicator</div>
  <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Archivist</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f472b6"></div>Executor</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(34,211,238,.4)"></div>Core</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(251,191,36,.3)"></div>Treasury</div>
</div>

<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Role colors ────────────────────────────────────────
const ROLE_COLOR = {
  Optimizer:    new THREE.Color(0x60a5fa),
  Strategist:   new THREE.Color(0xa78bfa),
  Communicator: new THREE.Color(0xfbbf24),
  Archivist:    new THREE.Color(0x34d399),
  Executor:     new THREE.Color(0xf472b6),
};
const ROLE_HEX = { Optimizer:'#60a5fa', Strategist:'#a78bfa', Communicator:'#fbbf24', Archivist:'#34d399', Executor:'#f472b6' };

// ─── Load data ──────────────────────────────────────────
const res = await fetch('system-state.json');
const S = await res.json();
const H = S.history.sort((a,b) => a.ep - b.ep);
const lastH = H[H.length - 1];
const agents = S.agents;

// ─── Scene setup ────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.025);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 3, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 30;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// ─── Lighting ───────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x111827, 0.5);
scene.add(ambient);

const coreLight = new THREE.PointLight(0x22d3ee, 2, 20);
coreLight.position.set(0, 0, 0);
scene.add(coreLight);

// ─── Starfield ──────────────────────────────────────────
const starCount = 2000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 100;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.4 });
scene.add(new THREE.Points(starGeo, starMat));

// ─── Core sphere (the organism) ─────────────────────────
const coreGeo = new THREE.IcosahedronGeometry(1.2, 3);
const coreMat = new THREE.MeshPhysicalMaterial({
  color: 0x0c4a6e,
  emissive: 0x22d3ee,
  emissiveIntensity: 0.15,
  transparent: true,
  opacity: 0.3,
  roughness: 0.4,
  metalness: 0.6,
  wireframe: true,
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Inner glow sphere
const glowMat = new THREE.MeshBasicMaterial({
  color: 0x22d3ee,
  transparent: true,
  opacity: 0.04,
});
const glowSphere = new THREE.Mesh(new THREE.SphereGeometry(1.1, 32, 32), glowMat);
scene.add(glowSphere);

// ─── Treasury gravity well ──────────────────────────────
// Visual: a dark amber ring below the core, size proportional to hoarded ATP
const treasuryScale = Math.min(S.tr_reserve / 5000, 4); // max visual size
const wellGeo = new THREE.TorusGeometry(treasuryScale * 0.5, 0.06, 8, 64);
const wellMat = new THREE.MeshBasicMaterial({
  color: 0xfbbf24,
  transparent: true,
  opacity: 0.15,
});
const treasuryWell = new THREE.Mesh(wellGeo, wellMat);
treasuryWell.rotation.x = Math.PI / 2;
treasuryWell.position.y = -1.5;
scene.add(treasuryWell);

// Treasury distortion rings
for (let i = 1; i <= 3; i++) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(treasuryScale * 0.5 + i * 0.3, 0.01, 8, 64),
    new THREE.MeshBasicMaterial({ color: 0xfbbf24, transparent: true, opacity: 0.04 })
  );
  ring.rotation.x = Math.PI / 2;
  ring.position.y = -1.5;
  ring.userData = { baseOpacity: 0.04, ringIndex: i };
  scene.add(ring);
}

// ─── Agent nodes ────────────────────────────────────────
const agentMeshes = [];
const orbitRadius = 3.5;

agents.forEach((agent, i) => {
  const angle = (i / agents.length) * Math.PI * 2;
  const color = ROLE_COLOR[agent.role] || new THREE.Color(0xffffff);

  // Reputation determines size (mass)
  const repSize = 0.12 + agent.rep * 0.2;

  // Node sphere
  const geo = new THREE.SphereGeometry(repSize, 16, 16);
  const mat = new THREE.MeshPhysicalMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.4 + agent.rep * 0.4,
    transparent: true,
    opacity: 0.85,
    roughness: 0.3,
    metalness: 0.5,
  });
  const mesh = new THREE.Mesh(geo, mat);

  // Orbit parameters
  const orbitR = orbitRadius + (agent.gen * 0.5); // further out per generation
  const orbitSpeed = 0.1 + (agent.contracts / 10000) * 0.15; // faster with more contracts
  const orbitTilt = (Math.random() - 0.5) * 0.4; // slight orbital inclination

  mesh.userData = {
    agent,
    angle: angle,
    orbitR,
    orbitSpeed,
    orbitTilt,
    baseEmissive: 0.4 + agent.rep * 0.4,
  };

  // Generation rings
  if (agent.gen > 0) {
    const ringGeo = new THREE.TorusGeometry(repSize + 0.06, 0.008, 8, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.3 });
    for (let g = 0; g < agent.gen; g++) {
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.y = (g - (agent.gen-1)/2) * 0.05;
      mesh.add(ring);
    }
  }

  // Primordial marker — golden crown
  if (agent.prim) {
    const crownGeo = new THREE.TorusGeometry(repSize + 0.08, 0.02, 6, 32);
    const crownMat = new THREE.MeshBasicMaterial({ color: 0xfbbf24, transparent: true, opacity: 0.7 });
    const crown = new THREE.Mesh(crownGeo, crownMat);
    crown.rotation.x = Math.PI / 2;
    mesh.add(crown);
  }

  // Low reputation → flicker effect (handled in animation)
  if (agent.rep < 0.6) {
    mesh.userData.flicker = true;
  }

  scene.add(mesh);
  agentMeshes.push(mesh);
});

// ─── Orbital trails (faint) ─────────────────────────────
agents.forEach((agent, i) => {
  const orbitR = orbitRadius + (agent.gen * 0.5);
  const trailGeo = new THREE.TorusGeometry(orbitR, 0.005, 4, 128);
  const trailMat = new THREE.MeshBasicMaterial({
    color: ROLE_COLOR[agent.role] || 0xffffff,
    transparent: true,
    opacity: 0.04,
  });
  const trail = new THREE.Mesh(trailGeo, trailMat);
  trail.rotation.x = Math.PI / 2 + agentMeshes[i].userData.orbitTilt;
  scene.add(trail);
});

// ─── Particle system for birth/death events ─────────────
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
const particleLifetimes = new Float32Array(particleCount);
const particleVelocities = [];

for (let i = 0; i < particleCount; i++) {
  particlePositions[i*3] = 0;
  particlePositions[i*3+1] = 0;
  particlePositions[i*3+2] = 0;
  particleColors[i*3] = 0;
  particleColors[i*3+1] = 0;
  particleColors[i*3+2] = 0;
  particleLifetimes[i] = 0;
  particleVelocities.push(new THREE.Vector3());
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.06,
  vertexColors: true,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

let nextParticle = 0;

function emitBurst(position, color, count = 15) {
  for (let i = 0; i < count; i++) {
    const idx = nextParticle % particleCount;
    nextParticle++;
    particlePositions[idx*3] = position.x;
    particlePositions[idx*3+1] = position.y;
    particlePositions[idx*3+2] = position.z;
    particleColors[idx*3] = color.r;
    particleColors[idx*3+1] = color.g;
    particleColors[idx*3+2] = color.b;
    particleLifetimes[idx] = 1.0;
    particleVelocities[idx].set(
      (Math.random()-0.5)*2,
      (Math.random()-0.5)*2,
      (Math.random()-0.5)*2
    ).normalize().multiplyScalar(0.5 + Math.random() * 1.5);
  }
}

// ─── Replay epoch history as events ─────────────────────
let historyIndex = 0;
let historyTimer = 0;
const EPOCH_INTERVAL = 5; // seconds between epoch replays

function replayNextEpoch() {
  if (historyIndex >= H.length) historyIndex = 0;
  const epoch = H[historyIndex];

  // Update HUD
  document.getElementById('epoch-num').textContent = epoch.ep.toLocaleString();
  document.getElementById('v-pop').textContent = epoch.pop + ' / ' + epoch.cap;
  document.getElementById('v-pop').className = 'vital-value' + (epoch.pop <= 6 ? ' danger' : epoch.pop >= 9 ? ' good' : '');
  document.getElementById('v-fit').textContent = epoch.mf.toFixed(4);
  document.getElementById('v-fit').className = 'vital-value' + (epoch.mf < 0.5 ? ' warn' : ' good');
  document.getElementById('v-atp').textContent = Math.round(epoch.atp).toLocaleString();
  document.getElementById('v-atp').className = 'vital-value' + (epoch.atp < 200 ? ' warn' : '');
  document.getElementById('v-bd').textContent = S.total_births.toLocaleString() + ' / ' + S.total_deaths.toLocaleString();
  const ratio = (S.total_births / Math.max(S.total_deaths, 1));
  document.getElementById('v-ratio').textContent = ratio.toFixed(3) + ':1';
  document.getElementById('v-ratio').className = 'vital-value' + (ratio < 1 ? ' danger' : ' good');

  // Treasury
  document.getElementById('ti-val').textContent = Math.round(S.tr_reserve).toLocaleString() + ' ATP';
  if (S.tr_distributed === 0 && S.tr_reserve > 100) {
    document.getElementById('ti-status').textContent = 'HOARDING — 0 ATP distributed';
  }

  // Birth events → quantum sparks (cyan)
  if (epoch.b > 0) {
    const birthAgent = agentMeshes[Math.floor(Math.random() * agentMeshes.length)];
    emitBurst(birthAgent.position, new THREE.Color(0x22d3ee), 20);
  }

  // Death events → red collapse
  if (epoch.d > 0) {
    const deathPos = new THREE.Vector3(
      (Math.random()-0.5) * orbitRadius * 2,
      (Math.random()-0.5) * 2,
      (Math.random()-0.5) * orbitRadius * 2
    );
    emitBurst(deathPos, new THREE.Color(0xf87171), 25);
  }

  // Core pulse intensity based on ATP
  const atpNorm = epoch.atp / 400; // normalized
  coreMat.emissiveIntensity = 0.1 + atpNorm * 0.2;
  coreLight.intensity = 1 + atpNorm * 2;

  historyIndex++;
}

// ─── Raycaster for hover ────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-999, -999);
const tooltip = document.getElementById('tooltip');

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(agentMeshes);

  if (hits.length > 0) {
    const agent = hits[0].object.userData.agent;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.innerHTML = `
      <div class="tt-role" style="color:${ROLE_HEX[agent.role]||'#fff'}">${agent.role}${agent.prim?' ★':''}</div>
      <div class="tt-row"><span class="tt-dim">Generation</span><span class="tt-val">${agent.gen}${agent.gen===0?' (primordial)':''}</span></div>
      <div class="tt-row"><span class="tt-dim">Contracts</span><span class="tt-val">${agent.contracts.toLocaleString()}</span></div>
      <div class="tt-row"><span class="tt-dim">Reputation</span><span class="tt-val">${(agent.rep*100).toFixed(1)}%</span></div>
      <div class="tt-row"><span class="tt-dim">Mutation Rate</span><span class="tt-val">${agent.mut}</span></div>
      <div class="tt-row"><span class="tt-dim">Basal Cost</span><span class="tt-val">${agent.basal} ATP/ep</span></div>
    `;
  } else {
    tooltip.style.display = 'none';
  }
});

// ─── Animation loop ─────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // Core breathing
  const breathe = 1 + Math.sin(t * 0.4) * 0.03;
  core.scale.setScalar(breathe);
  glowSphere.scale.setScalar(breathe * 1.02);
  core.rotation.y += dt * 0.05;
  core.rotation.x = Math.sin(t * 0.15) * 0.1;

  // Treasury well pulse
  treasuryWell.rotation.z += dt * 0.1;
  wellMat.opacity = 0.1 + Math.sin(t * 0.8) * 0.05;

  // Agent orbits
  agentMeshes.forEach(mesh => {
    const ud = mesh.userData;
    ud.angle += ud.orbitSpeed * dt;
    mesh.position.x = Math.cos(ud.angle) * ud.orbitR;
    mesh.position.z = Math.sin(ud.angle) * ud.orbitR;
    mesh.position.y = Math.sin(ud.angle * 0.7 + ud.orbitTilt * 5) * ud.orbitTilt * 3;

    // Flicker for low-rep agents
    if (ud.flicker) {
      mesh.material.emissiveIntensity = ud.baseEmissive * (0.3 + Math.random() * 0.7);
      mesh.material.opacity = 0.4 + Math.random() * 0.5;
    }
  });

  // Particles
  for (let i = 0; i < particleCount; i++) {
    if (particleLifetimes[i] > 0) {
      particleLifetimes[i] -= dt * 0.8;
      const v = particleVelocities[i];
      particlePositions[i*3] += v.x * dt;
      particlePositions[i*3+1] += v.y * dt;
      particlePositions[i*3+2] += v.z * dt;
      // Fade
      const fade = Math.max(0, particleLifetimes[i]);
      particleColors[i*3] *= fade > 0.1 ? 1 : 0.9;
      particleColors[i*3+1] *= fade > 0.1 ? 1 : 0.9;
      particleColors[i*3+2] *= fade > 0.1 ? 1 : 0.9;
      // Gravity toward treasury well
      v.y -= 0.3 * dt;
    }
  }
  particleGeo.attributes.position.needsUpdate = true;
  particleGeo.attributes.color.needsUpdate = true;

  // Epoch replay timer
  historyTimer += dt;
  if (historyTimer >= EPOCH_INTERVAL) {
    historyTimer = 0;
    replayNextEpoch();
  }

  controls.update();
  renderer.render(scene, camera);
}

// ─── Resize ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Start ──────────────────────────────────────────────
document.getElementById('loading').style.display = 'none';
replayNextEpoch(); // show first epoch immediately
animate();

</script>
</body>
</html>

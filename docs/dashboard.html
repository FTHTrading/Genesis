<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Protocol — Biome Observatory</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060a10;
    color: #8ab4c8;
    font-family: 'Courier New', Courier, monospace;
    font-size: 11px;
    overflow: hidden;
    user-select: none;
  }
  #canvas-host { position: fixed; inset: 0; }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 18px;
    left: 18px;
    width: 244px;
    pointer-events: none;
    z-index: 10;
  }
  .hud-title {
    font-size: 10px;
    letter-spacing: 0.20em;
    color: #2a4560;
    text-transform: uppercase;
    margin-bottom: 14px;
    border-bottom: 1px solid #111e2c;
    padding-bottom: 5px;
  }
  .hud-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }
  .hud-label { color: #2e4a60; }
  .hud-val   { color: #8ab4c8; }
  .hud-val.warn    { color: #d4a84b; }
  .hud-val.danger  { color: #c0392b; }
  .hud-val.healthy { color: #4caf6e; }
  .hud-sep {
    border: none;
    border-top: 1px solid #0f1f2e;
    margin: 8px 0;
  }
  #stress-badge {
    margin-top: 10px;
    padding: 4px 8px;
    border: 1px solid rgba(192,57,43,0.35);
    color: #c0392b;
    font-size: 9px;
    letter-spacing: 0.14em;
    display: none;
  }
  #season-badge {
    margin-top: 10px;
    padding: 4px 8px;
    font-size: 9px;
    letter-spacing: 0.12em;
    border: 1px solid #132030;
    color: #3a6080;
  }
  #hud-bottom {
    position: fixed;
    bottom: 18px;
    left: 18px;
    pointer-events: none;
    z-index: 10;
    color: #1e3040;
    font-size: 9px;
    letter-spacing: 0.08em;
    line-height: 2.1;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    background: rgba(5,8,14,0.94);
    border: 1px solid #1a3050;
    padding: 8px 12px;
    font-size: 10px;
    line-height: 1.75;
    color: #8ab4c8;
    display: none;
    max-width: 200px;
  }

  /* ── Phase transition banner ── */
  #phase-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 30;
    color: #c0392b;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.5s;
    text-align: center;
    line-height: 2;
  }
</style>
</head>
<body>
<div id="canvas-host"></div>

<div id="hud">
  <div class="hud-title">Genesis Protocol · Biome Observatory</div>
  <div class="hud-row"><span class="hud-label">EPOCH</span><span class="hud-val" id="h-epoch">—</span></div>
  <div class="hud-row"><span class="hud-label">POPULATION</span><span class="hud-val" id="h-pop">—</span></div>
  <div class="hud-row"><span class="hud-label">CIRCULATING</span><span class="hud-val" id="h-circ">—</span></div>
  <div class="hud-row"><span class="hud-label">TREASURY</span><span class="hud-val" id="h-treas">—</span></div>
  <hr class="hud-sep">
  <div class="hud-row"><span class="hud-label">B:D RATIO</span><span class="hud-val" id="h-bd">—</span></div>
  <div class="hud-row"><span class="hud-label">DOMINANCE</span><span class="hud-val" id="h-dom">—</span></div>
  <div class="hud-row"><span class="hud-label">AVG FITNESS</span><span class="hud-val" id="h-fit">—</span></div>
  <hr class="hud-sep">
  <div id="season-badge">SEASON: —</div>
  <div id="stress-badge">⬡ ADVERSARIAL OVERLAY</div>
</div>

<div id="hud-bottom">
  [A] adversarial overlay &nbsp;·&nbsp; [click] isolate agent &nbsp;·&nbsp; [drag] orbit
</div>

<div id="tooltip"></div>
<div id="phase-banner">PHASE TRANSITION<br>DETECTED</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const ROLE_COLOR = {
  Optimizer:    0x4fc3f7,
  Strategist:   0x81c784,
  Communicator: 0xffd54f,
  Archivist:    0xce93d8,
  Executor:     0xef9a9a,
};
const SEASON_PALETTE = {
  Spring: { bg: 0x080e0b, fog: '#111c16', orbitSpeed: 0.50 },
  Summer: { bg: 0x080810, fog: '#0d0e1e', orbitSpeed: 0.65 },
  Autumn: { bg: 0x0d0906, fog: '#1c1006', orbitSpeed: 0.45 },
  Winter: { bg: 0x050810, fog: '#070f1a', orbitSpeed: 0.35 },
};
const DATA_URL = 'system-state.json';
const SPHERE_R  = 5.8;
const TRAIL_LEN = 10;
const HAZE_N    = 2000;
const CURRENT_N = 200;

// ═══════════════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
document.getElementById('canvas-host').appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x060a10);
scene.fog        = new THREE.FogExp2('#0a1018', 0.040);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 2.5, 16);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping    = true;
controls.dampingFactor    = 0.06;
controls.maxDistance      = 28;
controls.minDistance      = 6;
controls.autoRotate       = true;
controls.autoRotateSpeed  = 0.5;

// ═══════════════════════════════════════════════════════
//  LIGHTS
// ═══════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x0c1e34, 2.0));

const coreLight = new THREE.PointLight(0x2080c0, 2.5, 18, 1.8);
scene.add(coreLight);

const rimLight = new THREE.DirectionalLight(0x1a3a5a, 0.5);
rimLight.position.set(-7, 5, -5);
scene.add(rimLight);

// ═══════════════════════════════════════════════════════
//  CONTAINMENT SPHERE — Fresnel glass shell
//  Custom GLSL: rim glow proportional to grazing angle
// ═══════════════════════════════════════════════════════
const fresnelVert = /* glsl */`
  varying vec3 vNormal;
  varying vec3 vViewPos;
  void main() {
    vNormal  = normalize(normalMatrix * normal);
    vec4 mv  = modelViewMatrix * vec4(position, 1.0);
    vViewPos = -mv.xyz;
    gl_Position = projectionMatrix * mv;
  }
`;
const fresnelFrag = /* glsl */`
  uniform vec3  rimColor;
  uniform float rimStrength;
  uniform float uTime;
  varying vec3 vNormal;
  varying vec3 vViewPos;
  void main() {
    vec3  view = normalize(vViewPos);
    float rim  = 1.0 - abs(dot(view, vNormal));
    rim = pow(rim, 2.6);
    float pulse = 1.0 + 0.05 * sin(uTime * 0.75);
    gl_FragColor = vec4(rimColor, rim * rimStrength * pulse);
  }
`;

function makeFresnel(radius, side, color, strength) {
  return new THREE.ShaderMaterial({
    uniforms: {
      rimColor:    { value: new THREE.Color(color) },
      rimStrength: { value: strength },
      uTime:       { value: 0.0 },
    },
    vertexShader:   fresnelVert,
    fragmentShader: fresnelFrag,
    side,
    transparent:  true,
    depthWrite:   false,
    blending:     THREE.AdditiveBlending,
  });
}

const shellMatInner = makeFresnel(SPHERE_R,        THREE.BackSide,  0x1a5080, 0.55);
const shellMatOuter = makeFresnel(SPHERE_R * 1.04, THREE.FrontSide, 0x0a2840, 0.18);

scene.add(new THREE.Mesh(new THREE.SphereGeometry(SPHERE_R,        64, 64), shellMatInner));
scene.add(new THREE.Mesh(new THREE.SphereGeometry(SPHERE_R * 1.04, 48, 48), shellMatOuter));

// ═══════════════════════════════════════════════════════
//  LIQUID CORE — breathing nucleus with vertex animation
// ═══════════════════════════════════════════════════════
const coreGeo    = new THREE.SphereGeometry(1.0, 48, 48);
const coreOrigPx = Float32Array.from(coreGeo.attributes.position.array);

const coreMat = new THREE.MeshPhysicalMaterial({
  color:              new THREE.Color(0x0d4870),
  emissive:           new THREE.Color(0x0a3060),
  emissiveIntensity:  1.2,
  transmission:       0.35,
  roughness:          0.10,
  metalness:          0.0,
  ior:                1.45,
  transparent:        true,
  opacity:            0.90,
});
const coreMesh = new THREE.Mesh(coreGeo, coreMat);
scene.add(coreMesh);

// Inner back-face glow
const innerGlowMat = new THREE.MeshBasicMaterial({
  color: 0x1a6090, transparent: true, opacity: 0.16, side: THREE.BackSide,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.2, 24, 24), innerGlowMat));

// ═══════════════════════════════════════════════════════
//  TREASURY SEDIMENT — gravity well at base
// ═══════════════════════════════════════════════════════
const sedGeo = new THREE.CylinderGeometry(2.1, 1.7, 0.30, 48);
const sedMat = new THREE.MeshPhysicalMaterial({
  color:             new THREE.Color(0x1a1000),
  emissive:          new THREE.Color(0x0d0800),
  emissiveIntensity: 0.45,
  roughness:         0.60,
  metalness:         0.28,
  transparent:       true,
  opacity:           0.84,
});
const sediment = new THREE.Mesh(sedGeo, sedMat);
sediment.position.y = -3.5;
scene.add(sediment);

// Rim glow
const sedGlowMat = new THREE.MeshBasicMaterial({
  color: 0x3a1a00, transparent: true, opacity: 0.20, side: THREE.BackSide,
});
const sedGlow = new THREE.Mesh(
  new THREE.CylinderGeometry(2.25, 1.85, 0.34, 32),
  sedGlowMat
);
sedGlow.position.y = -3.5;
scene.add(sedGlow);

// ═══════════════════════════════════════════════════════
//  TREASURY CURRENT PARTICLES — golden upward surge
// ═══════════════════════════════════════════════════════
const cpBuf = new Float32Array(CURRENT_N * 3);
const cpVel = Array.from({ length: CURRENT_N }, () => ({
  x: (Math.random() - 0.5) * 0.012,
  y: Math.random() * 0.04 + 0.02,
  z: (Math.random() - 0.5) * 0.012,
  life: Math.random(),
}));
for (let i = 0; i < CURRENT_N; i++) {
  const a = Math.random() * Math.PI * 2, r = Math.random() * 1.6;
  cpBuf[i*3]   = Math.cos(a) * r;
  cpBuf[i*3+1] = -3.5 + Math.random() * 0.4;
  cpBuf[i*3+2] = Math.sin(a) * r;
}
const cpGeo = new THREE.BufferGeometry();
cpGeo.setAttribute('position', new THREE.BufferAttribute(cpBuf, 3));
const cpMat = new THREE.PointsMaterial({
  color: 0xc8860a, size: 0.08, transparent: true, opacity: 0.0,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
scene.add(new THREE.Points(cpGeo, cpMat));

// ═══════════════════════════════════════════════════════
//  VOLUMETRIC HAZE — brownian drifting motes, NOT stars
//  Upward bias, bounce off inner sphere wall
// ═══════════════════════════════════════════════════════
const hzBuf = new Float32Array(HAZE_N * 3);
const hzVel = Array.from({ length: HAZE_N }, () => ({
  x: (Math.random() - 0.5) * 0.004,
  y:  Math.random() * 0.005 + 0.001,
  z: (Math.random() - 0.5) * 0.004,
}));
for (let i = 0; i < HAZE_N; i++) {
  const phi   = Math.acos(1 - 2 * Math.random());
  const theta = Math.random() * Math.PI * 2;
  const r     = Math.cbrt(Math.random()) * SPHERE_R * 0.92;
  hzBuf[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  hzBuf[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  hzBuf[i*3+2] = r * Math.cos(phi);
}
const hzGeo = new THREE.BufferGeometry();
hzGeo.setAttribute('position', new THREE.BufferAttribute(hzBuf, 3));
const hzMat = new THREE.PointsMaterial({
  color: 0x1a3a5a, size: 0.17, transparent: true, opacity: 0.055,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
const hazeMesh = new THREE.Points(hzGeo, hzMat);
scene.add(hazeMesh);

// ═══════════════════════════════════════════════════════
//  AGENT DROPLETS
// ═══════════════════════════════════════════════════════
const agentObjs = [];   // { mesh, trailGeo, trailHist[], orbitPhase, orbitSpeed, r, phi, data }

function spawnAgentDroplet(agentData, idx, total) {
  // Fibonacci sphere placement
  const phi   = Math.acos(-1 + (2 * (idx + 0.5)) / (total || 1));
  const theta = idx * 2.3999632297;

  const rol   = agentData.role || 'Optimizer';
  const rep   = agentData.reputation ?? 0.5;
  const gen   = agentData.generation ?? 0;
  const hex   = ROLE_COLOR[rol] ?? 0x4fc3f7;
  const size  = 0.11 + rep * 0.22;
  const r     = 2.6 + rep * 1.5;

  const startPos = new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta),
  );

  // Droplet mesh
  const mat = new THREE.MeshPhysicalMaterial({
    color:              new THREE.Color(hex),
    emissive:           new THREE.Color(hex),
    emissiveIntensity:  0.50,
    transmission:       0.22,
    roughness:          0.07,
    metalness:          0.0,
    ior:                1.35,
    transparent:        true,
    opacity:            0.88,
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 16, 16), mat);
  mesh.position.copy(startPos);
  mesh.userData = { agentData, index: idx };
  scene.add(mesh);

  // Generation ring (gen ≥ 3)
  if (gen >= 3) {
    const rGeo = new THREE.RingGeometry(size * 1.5, size * 1.7, 22);
    const rMat = new THREE.MeshBasicMaterial({
      color: hex, side: THREE.DoubleSide, transparent: true, opacity: 0.26,
    });
    mesh.add(new THREE.Mesh(rGeo, rMat));
  }

  // Primordial crown (gen 0)
  if (gen === 0) {
    const cMat = new THREE.MeshBasicMaterial({
      color: 0xffd700, wireframe: true, transparent: true, opacity: 0.22,
    });
    mesh.add(new THREE.Mesh(new THREE.OctahedronGeometry(size * 1.9, 0), cMat));
  }

  // Micro trail
  const trailPx = new Float32Array(TRAIL_LEN * 3);
  for (let j = 0; j < TRAIL_LEN * 3; j += 3) {
    trailPx[j] = startPos.x; trailPx[j+1] = startPos.y; trailPx[j+2] = startPos.z;
  }
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPx, 3));
  const trailMat = new THREE.LineBasicMaterial({
    color: hex, transparent: true, opacity: 0.18,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  scene.add(new THREE.Line(trailGeo, trailMat));

  return {
    mesh, trailGeo,
    trailHist: [startPos.clone()],
    orbitPhase: Math.random() * Math.PI * 2,
    orbitSpeed: 0.28 + Math.random() * 0.30,
    r, phi, data: agentData,
  };
}

function clearAgents() {
  agentObjs.forEach(o => { scene.remove(o.mesh); scene.remove(o.trailLine); });
  agentObjs.length = 0;
}

// ═══════════════════════════════════════════════════════
//  STATE & HUD BINDING
// ═══════════════════════════════════════════════════════
let adversarialMode = false;
let isolatedIdx     = null;
let lastBD          = 1.0;

function setText(id, v) {
  const el = document.getElementById(id);
  if (el) el.textContent = v;
}
function setVal(id, v, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = v;
  el.className = 'hud-val' + (cls ? ' ' + cls : '');
}

function applyState(d) {
  const ep   = d.epoch        ?? '—';
  const pop  = d.population   ?? '—';
  const circ = d.circulating_atp ?? d.total_atp_circulating ?? 0;
  const tres = d.treasury_reserve ?? 0;
  const bd   = d.birth_death_ratio ?? d.bd_ratio ?? 1.0;
  const fit  = d.mean_fitness ?? 0;
  const eco  = d.eco_state    ?? d.season ?? 'Autumn';
  const dist = d.treasury_distributed ?? 0;

  const domPct = (tres + circ) > 0 ? tres / (tres + circ) * 100 : 0;

  setText('h-epoch', ep);
  setText('h-pop',   pop);
  setVal('h-circ',  typeof circ === 'number' ? circ.toFixed(0) + ' ATP' : circ);
  setVal('h-treas', typeof tres === 'number' ? tres.toFixed(0) + ' ATP' : tres,
    domPct > 88 ? 'danger' : domPct > 70 ? 'warn' : '');
  setVal('h-bd', typeof bd === 'number' ? bd.toFixed(3) : bd,
    bd < 0.95 ? 'danger' : bd < 1.05 ? 'warn' : 'healthy');
  setVal('h-dom', domPct.toFixed(1) + '%',
    domPct > 88 ? 'danger' : domPct > 70 ? 'warn' : '');
  setVal('h-fit', fit.toFixed(4));

  const season = typeof eco === 'string'
    ? eco.charAt(0).toUpperCase() + eco.slice(1).toLowerCase()
    : 'Autumn';
  document.getElementById('season-badge').textContent = 'SEASON: ' + season.toUpperCase();

  // ── Sediment color: gold → cold blue with hoarding ──
  sedMat.color.lerpColors(
    new THREE.Color(0x2a1400),
    new THREE.Color(0x0a1a2c),
    Math.min(domPct / 100, 1.0)
  );
  sedMat.emissive.copy(sedMat.color).multiplyScalar(0.4);

  // ── Treasury current opacity ──
  cpMat.opacity = dist > 0 ? Math.min(0.65, dist / 4.0) : cpMat.opacity * 0.88;

  // ── Core health color ──
  const h = Math.max(0, Math.min(1, (bd - 0.9) / 0.2));
  coreMat.color.lerpColors(new THREE.Color(0x3a0808), new THREE.Color(0x0d4870), h);
  coreMat.emissive.lerpColors(new THREE.Color(0x300505), new THREE.Color(0x0a3060), h);
  shellMatInner.uniforms.rimColor.value.lerpColors(
    new THREE.Color(0x6a0a0a), new THREE.Color(0x1a5080), h
  );

  // ── Seasonal atmosphere lerp ──
  const pal = SEASON_PALETTE[season] ?? SEASON_PALETTE.Autumn;
  scene.background.lerp(new THREE.Color(pal.bg), 0.015);
  scene.fog.color.lerp(new THREE.Color(pal.fog), 0.015);
  controls.autoRotateSpeed = pal.orbitSpeed * (adversarialMode ? 1.5 : 1.0);

  // ── Rebuild agents if population changed ──
  const agents = d.agents ?? [];
  if (agents.length !== agentObjs.length) {
    clearAgents();
    agents.forEach((a, i) => agentObjs.push(spawnAgentDroplet(a, i, agents.length)));
  } else {
    agents.forEach((a, i) => { if (agentObjs[i]) agentObjs[i].data = a; });
  }

  // ── Phase transition flash ──
  if (lastBD - bd > 0.08) flashPhaseBanner();
  lastBD = bd;
}

async function fetchState() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (r.ok) applyState(await r.json());
  } catch (_) { /* tolerate fetch failure */ }
}

function flashPhaseBanner() {
  const el = document.getElementById('phase-banner');
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 3500);
}

// ═══════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mPos      = new THREE.Vector2();
const tooltip   = document.getElementById('tooltip');

window.addEventListener('mousemove', e => {
  mPos.x =  (e.clientX / innerWidth)  * 2 - 1;
  mPos.y = -(e.clientY / innerHeight) * 2 + 1;
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top  = (e.clientY + 12) + 'px';

  raycaster.setFromCamera(mPos, camera);
  const hits = raycaster.intersectObjects(agentObjs.map(o => o.mesh));
  if (hits.length) {
    const d = hits[0].object.userData.agentData;
    if (d) {
      tooltip.innerHTML = [
        `<b>${d.role ?? '—'}</b>`,
        `Rep: ${(d.reputation ?? 0).toFixed(4)}`,
        `Gen: ${d.generation ?? 0}`,
        `ATP: ${(d.atp_balance ?? 0).toFixed(2)}`,
        d.in_stasis ? '<span style="color:#d4a84b">● STASIS</span>' : '',
      ].filter(Boolean).join('<br>');
      tooltip.style.display = 'block';
    }
  } else {
    tooltip.style.display = 'none';
  }
});

window.addEventListener('click', () => {
  raycaster.setFromCamera(mPos, camera);
  const hits = raycaster.intersectObjects(agentObjs.map(o => o.mesh));
  if (hits.length) {
    const idx = hits[0].object.userData.index;
    isolatedIdx = isolatedIdx === idx ? null : idx;
  } else {
    isolatedIdx = null;
  }
  agentObjs.forEach((o, i) => {
    const dim = isolatedIdx !== null && i !== isolatedIdx;
    o.mesh.material.opacity = dim ? 0.10 : 0.88;
  });
});

window.addEventListener('keydown', e => {
  if (e.key !== 'a' && e.key !== 'A') return;
  adversarialMode = !adversarialMode;
  document.getElementById('stress-badge').style.display = adversarialMode ? 'block' : 'none';
  shellMatInner.uniforms.rimStrength.value = adversarialMode ? 0.82 : 0.55;
  shellMatOuter.uniforms.rimStrength.value = adversarialMode ? 0.30 : 0.18;
  hzMat.color.set(adversarialMode ? 0x3a1010 : 0x1a3a5a);
  hzMat.opacity = adversarialMode ? 0.10 : 0.055;
  if (adversarialMode) flashPhaseBanner();
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════
const clock = new THREE.Clock();
let lastFetch = -8;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Refresh data every 8 seconds
  if (t - lastFetch >= 8) { lastFetch = t; fetchState(); }

  // Shader time uniforms
  shellMatInner.uniforms.uTime.value = t;
  shellMatOuter.uniforms.uTime.value = t;

  // ── Liquid core vertex displacement ──
  const pArr = coreGeo.attributes.position.array;
  const freq = adversarialMode ? 4.8 : 2.9;
  const amp  = adversarialMode ? 0.10 : 0.055;
  for (let i = 0; i < pArr.length; i += 3) {
    const ox = coreOrigPx[i], oy = coreOrigPx[i+1], oz = coreOrigPx[i+2];
    const d = Math.sin(ox * freq + t * 1.1)
            * Math.cos(oy * freq + t * 0.8)
            * Math.sin(oz * freq + t * 0.95) * amp;
    pArr[i]   = ox + ox * d;
    pArr[i+1] = oy + oy * d;
    pArr[i+2] = oz + oz * d;
  }
  coreGeo.attributes.position.needsUpdate = true;
  coreGeo.computeVertexNormals();

  // Core pulse
  const pulse = 1.0 + 0.20 * Math.sin(t * (adversarialMode ? 3.8 : 1.5));
  coreLight.intensity        = 2.5 * pulse;
  coreMat.emissiveIntensity  = 1.2 * pulse;

  // ── Agent droplet orbits ──
  agentObjs.forEach((o, i) => {
    const spd = o.orbitSpeed * controls.autoRotateSpeed * 0.02;
    o.orbitPhase += spd + (adversarialMode ? Math.sin(t * 2.3 + i) * 0.002 : 0);

    const wobble = 0.07 * Math.sin(t * 0.65 + i * 1.3);
    const phi    = o.phi + wobble;
    const theta  = o.orbitPhase;
    const r      = o.r + 0.14 * Math.sin(t * 0.5 + i * 0.9);

    o.mesh.position.set(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta),
    );

    // Update micro trail
    o.trailHist.push(o.mesh.position.clone());
    if (o.trailHist.length > TRAIL_LEN) o.trailHist.shift();
    const ta = o.trailGeo.attributes.position.array;
    o.trailHist.forEach((p, j) => { ta[j*3] = p.x; ta[j*3+1] = p.y; ta[j*3+2] = p.z; });
    o.trailGeo.attributes.position.needsUpdate = true;

    // Keep rings facing camera
    o.mesh.children.forEach(c => {
      if (c.geometry?.parameters?.innerRadius != null) c.lookAt(camera.position);
    });
  });

  // ── Volumetric haze brownian drift ──
  const ha = hzGeo.attributes.position.array;
  for (let i = 0; i < HAZE_N; i++) {
    const ix = i * 3;
    hzVel[i].x += (Math.random() - 0.5) * 0.0012;
    hzVel[i].y += (Math.random() - 0.5) * 0.0006;
    hzVel[i].z += (Math.random() - 0.5) * 0.0012;

    ha[ix]   += hzVel[i].x;
    ha[ix+1] += hzVel[i].y;
    ha[ix+2] += hzVel[i].z;

    const dx = ha[ix], dy = ha[ix+1], dz = ha[ix+2];
    const d2 = dx*dx + dy*dy + dz*dz;
    if (d2 > (SPHERE_R * 0.90) ** 2) {
      const inv = 1.0 / Math.sqrt(d2);
      hzVel[i].x -= dx * inv * 0.006;
      hzVel[i].y -= dy * inv * 0.006;
      hzVel[i].z -= dz * inv * 0.006;
    }
    // dampen, keep upward bias
    hzVel[i].x *= 0.994;
    hzVel[i].z *= 0.994;
    hzVel[i].y  = Math.max(-0.005, Math.min(0.016, hzVel[i].y));
  }
  hzGeo.attributes.position.needsUpdate = true;

  // ── Treasury current particles ascend ──
  const ca = cpGeo.attributes.position.array;
  for (let i = 0; i < CURRENT_N; i++) {
    const ix = i * 3;
    ca[ix]   += cpVel[i].x;
    ca[ix+1] += cpVel[i].y;
    ca[ix+2] += cpVel[i].z;
    cpVel[i].life += 0.016;
    if (cpVel[i].life > 1 || ca[ix+1] > 0.6) {
      const a = Math.random() * Math.PI * 2, rr = Math.random() * 1.6;
      ca[ix]   = Math.cos(a) * rr;
      ca[ix+1] = -3.5 + Math.random() * 0.3;
      ca[ix+2] = Math.sin(a) * rr;
      cpVel[i] = {
        x: (Math.random()-0.5)*0.012, y: Math.random()*0.045+0.02,
        z: (Math.random()-0.5)*0.012, life: 0,
      };
    }
  }
  cpGeo.attributes.position.needsUpdate = true;

  // Sediment rim pulse
  sedGlowMat.opacity = 0.17 + 0.06 * Math.sin(t * 0.58);

  controls.update();
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
fetchState();
animate();
</script>
</body>
